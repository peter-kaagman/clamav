apiVersion: v1
kind: ConfigMap
metadata:
  name: clamav-config
  namespace: default # change if needed
data:
  clamd.conf: |
    # For TCP performance
    MaxThreads 8
    MaxConnectionQueueLength 32
    # For INSTREAM scans
    StreamMaxLength 25M
    # For TCP accessibility
    TCPSocket 3310
    TCPAddr 0.0.0.0
    # Container-optimized clamd.conf
    LocalSocket /var/run/clamav/clamd.ctl
    LocalSocketGroup clamav
    LocalSocketMode 666
    User clamav
    DatabaseDirectory /var/lib/clamav
    LogFile /dev/stdout
    LogTime true
    LogRotate false
    LogSyslog false
    LogVerbose false
    MaxThreads 4
    MaxScanSize 100M
    MaxFileSize 25M
    MaxRecursion 16
    MaxFiles 10000
    SelfCheck 3600
    Foreground true
    ScanMail true
    ScanArchive true
    ScanPDF true
    ScanOLE2 true
    ScanELF true
    ScanHTML true
    ExtendedDetectionInfo true
    Bytecode true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: freshclam-config
  namespace: default # change if needed
  labels:
    app: clamav

data:
  freshclam.conf: |
    # Container-optimized freshclam.conf
    DatabaseOwner clamav
    DatabaseDirectory /var/lib/clamav
    DNSDatabaseInfo current.cvd.clamav.net
    ConnectTimeout 30
    ReceiveTimeout 0
    ScriptedUpdates yes
    Bytecode true
    NotifyClamd /etc/clamav/clamd.conf
    Checks 24
    DatabaseMirror db.local.clamav.net
    DatabaseMirror database.clamav.net
    LogTime true
    Foreground false
    MaxAttempts 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
      - name: clamav
        image: <jouw-ghcr-image>
        ports:
        - containerPort: 3310
        volumeMounts:
        - name: clamav-db
          mountPath: /var/lib/clamav
        - name: clamav-config
          mountPath: /etc/clamav/clamd.conf
          subPath: clamd.conf
        - name: freshclam-config
          mountPath: /etc/clamav/freshclam.conf
          subPath: freshclam.conf
        livenessProbe:
          tcpSocket:
            port: 3310
          initialDelaySeconds: 30
          periodSeconds: 60
      volumes:
      - name: clamav-db
        persistentVolumeClaim:
          claimName: clamav-db-pvc
      - name: clamav-config
        configMap:
          name: clamav-config
      - name: freshclam-config
        configMap:
          name: freshclam-config
---
apiVersion: v1
kind: Service
metadata:
  name: clamav
spec:
  selector:
    app: clamav
  ports:
    - protocol: TCP
      port: 3310
      targetPort: 3310
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clamav-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
