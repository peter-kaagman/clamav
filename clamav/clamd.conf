# Voor TCP performance
MaxThreads 8
MaxConnectionQueueLength 32
# Voor INSTREAM scans
StreamMaxLength 25M
# Voor TCP-bereikbaarheid
TCPSocket 3310
TCPAddr 0.0.0.0
# Container-optimized clamd.conf
LocalSocket /var/run/clamav/clamd.ctl
LocalSocketGroup clamav
LocalSocketMode 666
User clamav
DatabaseDirectory /var/lib/clamav
# LogFile /dev/stdout
LogTime true
LogRotate false
LogSyslog false
LogVerbose false
MaxThreads 4
MaxScanSize 100M
MaxFileSize 25M
MaxRecursion 16
MaxFiles 10000
SelfCheck 3600
Foreground true
ScanMail true
ScanArchive true
ScanPDF true
ScanOLE2 true
ScanELF true
ScanHTML true
ExtendedDetectionInfo true
Bytecode true
